# =============================================================================
# OKE (Oracle Kubernetes Engine) Overrides
# =============================================================================
# OKE uses Flannel (VXLAN) as its CNI. Cilium runs in CNI chaining mode
# (generic-veth) — Flannel handles all networking, Cilium only attaches eBPF
# programs for Hubble observability.
clusterDomain: OCI

cilium:
  enabled: false
  # CNI Chaining: Cilium chains after Flannel using generic-veth mode.
  # Flannel handles networking/IPAM, Cilium only attaches eBPF for visibility.
  cni:
    chainingMode: generic-veth
    customConf: true
    configMap: cni-configuration
    # Install cilium-cni binary (required for chaining)
    install: true
    # Don't remove Flannel's config
    exclusive: false
    binPath: /opt/cni/bin
    confPath: /etc/cni/net.d

  # Let Flannel handle routing — Cilium stays passive
  routingMode: native
  enableIPv4Masquerade: false
  enableIdentityMark: false

  # No policy enforcement — pure observability
  policyEnforcementMode: "never"

  # Do not replace kube-proxy — leave service routing to kube-proxy + Flannel
  kubeProxyReplacement: false

  # CRITICAL: Do not install iptables rules
  installIptablesRules: false
  installNoConntrackIptablesRules: false

  # Do not manage endpoint routes — let Flannel handle all routing
  enableEndpointRoutes: false

  # Disable features that modify the datapath
  hostFirewall:
    enabled: false
  l7Proxy: false
  sessionAffinity: false

  # IPAM: Cilium doesn't allocate IPs, Flannel does
  ipam:
    mode: cluster-pool
    operator:
      clusterPoolIPv4PodCIDRList:
        - "10.244.0.0/16"

  bpf:
    hostRouting: false
    masquerade: false

  operator:
    replicas: 1

  # Hubble for flow visibility
  hubble:
    enabled: true
    listenAddress: ":4244"
    relay:
      enabled: true
      replicas: 1
      resources:
        requests:
          cpu: 100m
          memory: 128Mi
        limits:
          cpu: 500m
          memory: 256Mi

falco:
  enabled: true

# OKE uses CRI-O, not containerd
vulnScannerCron:
  containerRuntimeSocket: /run/crio/crio.sock